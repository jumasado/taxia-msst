async function sbGet(t,p=''){
  const r=await fetch(`${SB_URL}/rest/v1/${t}${p}`,{headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}});
  return r.json();
}
async function sbPost(t,d,pref='return=representation'){
  return fetch(`${SB_URL}/rest/v1/${t}`,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':pref},body:JSON.stringify(d)});
}
async function sbPatch(t,p,d){
  return fetch(`${SB_URL}/rest/v1/${t}${p}`,{method:'PATCH',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':'return=representation'},body:JSON.stringify(d)});
}
async function sbUpsert(t,d,conflict=''){
  const pref=conflict?'resolution=merge-duplicates,return=representation':'return=representation';
  return fetch(`${SB_URL}/rest/v1/${t}`,{method:'POST',headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY,'Content-Type':'application/json','Prefer':pref},body:JSON.stringify(d)});

function todayKey(){
  return new Date().toLocaleDateString('en-CA',{timeZone:'America/Tijuana'});
}
function nowISO(){return new Date().toLocaleString('sv-SE',{timeZone:'America/Tijuana',hour12:false}).replace(' ','T')+'-07:00'}
function formatDate(k){const d=new Date(k+'T12:00:00');return d.toLocaleDateString('es-MX',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}
function formatDateShort(k){const d=new Date(k+'T12:00:00');return d.toLocaleDateString('es-MX',{month:'short',day:'numeric'})}

  if(session.role==='manager') return all.filter(e=>usersCache[e].role!=='admin');

  const admin=Object.keys(usersCache).find(e=>usersCache[e].role==='admin');

async function getActiveTareas(email){
  const today=todayKey();
  const {data:tareas}=await sbGet('tareas',`?email=eq.${encodeURIComponent(email)}&select=*&order=orden.asc,created_at.asc`).then(r=>({data:r}));
  if(!tareas) return [];
  // pendientes de cualquier fecha + concluidas de hoy
  return tareas.filter(t=>t.status==='pendiente'||t.status==='standby'||t.status==='eliminada'||(t.status==='concluida'&&t.fecha_conclusion&&t.fecha_conclusion.startsWith(today)));
}

let currentSessionId=null;

async function registrarLogin(email){
  try{
    const res=await sbPost('sesiones',{email,login_at:nowISO()},'return=representation');
    const data=await res.json();
    currentSessionId=(Array.isArray(data)?data[0]:data)?.id||null;
  }catch(e){console.warn('Session log error:',e);}
}

async function registrarLogout(){
  if(!currentSessionId||!session)return;
  try{
    const loginRes=await sbGet('sesiones',`?id=eq.${currentSessionId}&select=login_at`);
    const loginAt=loginRes?.[0]?.login_at;
    const logoutAt=nowISO();
    let duracion_min=null;
    if(loginAt){
      const diff=new Date(logoutAt)-new Date(loginAt);
      duracion_min=Math.round(diff/60000);
    }
    await sbPatch('sesiones',`?id=eq.${currentSessionId}`,{logout_at:logoutAt,duracion_min});
    currentSessionId=null;
  }catch(e){console.warn('Logout log error:',e);}
}

async function doLogout(porInactividad=false){
  await registrarLogout();
  session=null;usersCache={};clientesCache=[];gruposCache=[];
  clearInactivityTimer();
  if(porInactividad){
    renderLogin();
    setTimeout(()=>{
      const msg=document.createElement('div');
      msg.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;font-size:13px;padding:10px 20px;border-radius:8px;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.2)';
      msg.textContent='Sesión cerrada por inactividad (10 min)';
      document.body.appendChild(msg);
      setTimeout(()=>msg.remove(),3500);
    },100);
  } else {
    renderLogin();
  }
}

// ===== AUTO-LOGOUT POR INACTIVIDAD =====
let inactivityTimer=null;
const INACTIVITY_MS=10*60*1000; // 10 minutos

function resetInactivityTimer(){
  if(!session)return;
  clearTimeout(inactivityTimer);
  inactivityTimer=setTimeout(()=>{
    if(session) doLogout(true);
  },INACTIVITY_MS);
}

function clearInactivityTimer(){
  clearTimeout(inactivityTimer);
  inactivityTimer=null;
}

function startInactivityWatcher(){
  ['mousemove','mousedown','keydown','touchstart','scroll','click'].forEach(ev=>{
    document.addEventListener(ev,resetInactivityTimer,{passive:true});
  });
  resetInactivityTimer();
}
function nav(s){
  const t=todayKey();
  if(s==='dashboard') renderDashboard(t);
  else if(s==='plan') renderMisPlan(null);
  else if(s==='clientes') renderClientes();
  else if(s==='historial') renderHistory();
  else if(s==='devoluciones') renderDevoluciones();
  else if(s==='admin') renderAdmin();
}

function getTodayNews() {
  // Selecciona 2 noticias diferentes cada día basado en el día del año
  const now = new Date();
  const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
  const idx1 = dayOfYear % NEWS_POOL.length;
  const idx2 = (dayOfYear + 7) % NEWS_POOL.length;
  // Evitar duplicados
  const i2 = idx1 === idx2 ? (idx2 + 1) % NEWS_POOL.length : idx2;
  return [NEWS_POOL[idx1], NEWS_POOL[i2]];
}

function renderNewsCards() {
  const noticias = getTodayNews();
  return noticias.map(n => `

}

async function doLogin(){
  const em=document.getElementById('lemail').value.trim().toLowerCase();
  const pw=document.getElementById('lpass').value;
  const btn=document.getElementById('lbtn');
  btn.innerHTML='<span class="spinner"></span> Verificando...';btn.disabled=true;
  try{
    const data=await sbGet('users',`?email=eq.${encodeURIComponent(em)}&pass=eq.${encodeURIComponent(pw)}&select=*`);
    if(!data||!data.length){document.getElementById('lerr').style.display='block';btn.innerHTML='Entrar';btn.disabled=false;return;}
    session={...data[0]};
    const [allU]=await Promise.all([sbGet('users','?select=*'),loadCaches()]);
    allU.forEach(u=>{usersCache[u.email]=u;});
    await registrarLogin(session.email);
    startInactivityWatcher();
    if(session.role==='assistant') renderMisPlan();
    else renderDashboard(todayKey());
  }catch(e){
    document.getElementById('lerr').textContent='Error de conexión.';document.getElementById('lerr').style.display='block';btn.innerHTML='Entrar';btn.disabled=false;
  }
}

  app.innerHTML=renderTopNav('plan')+selectorHTML+`<div class="loading" id="pl"><span class="spinner"></span>Cargando tareas...</div><div id="pf"></div>`;

        const toggleArgs="'"+t.id+"','"+( isDone?'pendiente':'concluida')+"','"+tEmail+"'";

function mostrarModalConclusion(tareaId, targetEmail){
  const motivos=[
    {id:'satisfactorio',txt:'Satisfactoriamente'},
    {id:'no_satisfactorio',txt:'No satisfactoriamente'},
    {id:'no_aplica',txt:'Se concluye porque ya no aplica'},
    {id:'genera_nueva',txt:'Se concluye pero se genera una nueva tarea'},
    {id:'comentar_superior',txt:'Se comentará con superior'}
  ];
  let selected=null;
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.id='modal-conclusion';
  overlay.innerHTML=`
    <div class="modal-box">
      <div class="modal-title">Concluir tarea</div>
      <div class="modal-sub">Selecciona el motivo de conclusión:</div>
      ${motivos.map((m,i)=>`<div class="motivo-opt" id="mopt-${m.id}" onclick="selectMotivo('${m.id}')">
        <div class="motivo-num">${i+1}</div>
        <div class="motivo-text">${m.txt}</div>
      </div>`).join('')}
      <div style="display:flex;gap:8px;margin-top:1rem">
        <button class="btn btn-full" onclick="cerrarModal()" style="flex:1;margin-top:0">Cancelar</button>
        <button class="btn btn-success btn-full" id="btn-confirmar-conclusion" onclick="confirmarConclusion('${tareaId}','${targetEmail}')" style="flex:1;margin-top:0" disabled>Confirmar</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);
}

function selectMotivo(id){
  document.querySelectorAll('.motivo-opt').forEach(el=>el.classList.remove('selected'));
  document.getElementById('mopt-'+id)?.classList.add('selected');
  const btn=document.getElementById('btn-confirmar-conclusion');
  if(btn){btn.disabled=false;btn.dataset.motivo=id;}
}

function cerrarModal(){
  document.getElementById('modal-conclusion')?.remove();
}

const MOTIVOS_TEXTO={
  satisfactorio:'Satisfactoriamente',
  no_satisfactorio:'No satisfactoriamente',
  no_aplica:'Ya no aplica',
  genera_nueva:'Genera nueva tarea',
  comentar_superior:'Se comentará con superior'
};

async function confirmarConclusion(tareaId,targetEmail){
  const btn=document.getElementById('btn-confirmar-conclusion');
  const motivoId=btn?.dataset?.motivo;
  if(!motivoId) return;
  cerrarModal();
  const motivoTxt=MOTIVOS_TEXTO[motivoId]||motivoId;
  const generaNueva=motivoId==='genera_nueva';
  const {data:t}=await sbGet('tareas',`?id=eq.${tareaId}&select=bitacora,descripcion,client_id,client_name,fecha_creacion`).then(r=>({data:r?.[0]}));
  const bits=[...(t?.bitacora||[]),{fecha:nowISO(),evento:`Concluida por ${session.name} — ${motivoTxt}`}];
  await sbPatch('tareas',`?id=eq.${tareaId}`,{status:'concluida',fecha_conclusion:nowISO(),updated_at:nowISO(),motivo_conclusion:motivoTxt,genera_nueva_tarea:generaNueva,bitacora:bits});
  if(generaNueva){
    const today=todayKey();
    const tareas=await getActiveTareas(targetEmail);
    const pendientes=tareas.filter(x=>x.status==='pendiente');
    if(pendientes.length<5){
      const bitNueva=[{fecha:nowISO(),evento:`Generada por conclusión de tarea anterior — ${session.name}`}];
      await sbPost('tareas',{email:targetEmail,descripcion:'[NUEVA] '+escH(t?.descripcion||''),client_id:t?.client_id||null,client_name:t?.client_name||'',fecha_creacion:today,status:'pendiente',orden:tareas.length,asignada_por:session.email,bitacora:bitNueva});
    }
  }
  renderMisPlan(targetEmail);
}

async function eliminarTarea(tareaId,targetEmail){
  if(!confirm('¿Eliminar esta tarea? Quedará marcada como eliminada en el historial.')) return;
  const {data:t}=await sbGet('tareas',`?id=eq.${tareaId}&select=bitacora`).then(r=>({data:r?.[0]}));
  const bits=[...(t?.bitacora||[]),{fecha:nowISO(),evento:`Eliminada por ${session.name}`}];
  await sbPatch('tareas',`?id=eq.${tareaId}`,{status:'eliminada',updated_at:nowISO(),bitacora:bits});
  renderMisPlan(targetEmail);
}

async function addTarea(idx){await addTareaRemota(idx,session.email);}

async function addTareaRemota(idx,targetEmail){
  const desc=document.getElementById(`ndesc-${idx}`).value.trim();
  const cliId=document.getElementById(`ncli-${idx}`).value;
  const cliName=cliId?(clientesCache.find(c=>c.id===cliId)||{}).nombre||'':'';
  const err=document.getElementById('tarea-err');
  if(!desc){err.textContent='Escribe una descripción.';err.style.display='block';setTimeout(()=>err.style.display='none',2500);return;}
  const today=todayKey();
  const tareas=await getActiveTareas(targetEmail);
  const pendientes=tareas.filter(t=>t.status==='pendiente');
  if(pendientes.length>=5){
    const nm=usersCache[targetEmail]?.name||targetEmail;
    err.textContent=`${nm} ya tiene 5 tareas pendientes activas.`;err.style.display='block';
    setTimeout(()=>err.style.display='none',3000);return;
  }
  const asignadaPor=targetEmail!==session.email?session.email:null;
  const nombreCorto=session.name.split(' ').slice(0,2).join(' ');
  const bitInicial=[{fecha:nowISO(),evento:asignadaPor?`Asignada por ${nombreCorto}`:`Creada por ${nombreCorto}`}];
  await sbPost('tareas',{email:targetEmail,descripcion:desc,client_id:cliId||null,client_name:cliName,fecha_creacion:today,status:'pendiente',orden:tareas.length,asignada_por:asignadaPor,bitacora:bitInicial});
  await sendPlanNotification([...tareas,{descripcion:desc,client_name:cliName,status:'pendiente'}],targetEmail);
  const ok=document.getElementById('tarea-ok');
  const nm=targetEmail!==session.email?` a ${usersCache[targetEmail]?.name||targetEmail}`:'';
  ok.textContent=`Tarea asignada${nm}.`;ok.style.display='block';
  setTimeout(()=>ok.style.display='none',2000);
  renderMisPlan(targetEmail);
}

async function concluirTarea(id){await concluirTareaRemota(id,session.email);}

async function concluirTareaRemota(id,targetEmail){
  mostrarModalConclusion(id,targetEmail);
}

async function toggleTarea(id,newStatus,targetEmail){
  const email=targetEmail||session.email;
  if(newStatus==='concluida'){await concluirTareaRemota(id,email);return;}
  const bit={fecha:nowISO(),evento:'Reactivada'};
  const {data:t}=await sbGet('tareas',`?id=eq.${id}&select=bitacora`).then(r=>({data:r?.[0]}));
  const bits=[...(t?.bitacora||[]),bit];
  await sbPatch('tareas',`?id=eq.${id}`,{status:'pendiente',fecha_conclusion:null,updated_at:nowISO(),bitacora:bits});
  renderMisPlan(email);
}

async function toggleStandby(id,currentlyStandby,targetEmail){
  const email=targetEmail||session.email;
  const isStandby=currentlyStandby==='true'||currentlyStandby===true;
  const newStatus=isStandby?'pendiente':'standby';
  const evento=isStandby?'Reactivada desde Stand By':'Puesta en Stand By';
  const {data:t}=await sbGet('tareas',`?id=eq.${id}&select=bitacora,fecha_creacion,updated_at`).then(r=>({data:r?.[0]}));
  const bits=[...(t?.bitacora||[]),{fecha:nowISO(),evento}];
  await sbPatch('tareas',`?id=eq.${id}`,{status:newStatus,updated_at:nowISO(),fecha_standup:isStandby?null:nowISO(),bitacora:bits});
  renderMisPlan(email);
}

    </div>

      <p style="font-size:14px;color:#555;margin-bottom:16px"><strong>${session.name}</strong> actualizó sus tareas del día.</p>
      <table style="width:100%;border-collapse:collapse;font-size:14px">
        <thead><tr style="background:#f5f5f3">
          <th style="padding:8px 12px;text-align:left;font-size:12px;color:#888">#</th>
          <th style="padding:8px 12px;text-align:left;font-size:12px;color:#888">Tarea</th>
          <th style="padding:8px 12px;text-align:left;font-size:12px;color:#888">Cliente</th>
          <th style="padding:8px 12px;text-align:left;font-size:12px;color:#888">Estatus</th>
        </tr></thead>
        <tbody>${filas}</tbody>

  <div class="card">

  </div>

    <div class="card" style="margin:0"><div class="sec-label">Historial — tareas concluidas por día</div><canvas id="chart-hist" height="200"></canvas></div>
    <div class="card" style="margin:0"><div class="sec-label">Avance hoy por persona</div><canvas id="chart-comp" height="200"></canvas></div>

    <div class="sec-label">Análisis ejecutivo — Claude</div>
    <div class="analysis-box" id="abox"><span style="color:#bbb;font-style:italic">Presiona "Analizar" para el resumen ejecutivo.</span></div>
    <button class="btn btn-purple btn-full" style="margin-top:12px" onclick="runAnalysis()">Analizar con Claude ↗</button>
  </div>`;

  buildCharts(visible,allTareas||[],byEmail);
}

function buildCharts(visible,allTareas,byEmail){
  // Historial: últimos 14 días, tareas concluidas por día por persona
  const dateMap={};
  allTareas.forEach(t=>{
    if(!visible.includes(t.email)||t.status!=='concluida'||!t.fecha_conclusion)return;
    const d=t.fecha_conclusion.slice(0,10);
    if(!dateMap[d])dateMap[d]={};
    dateMap[d][t.email]=(dateMap[d][t.email]||0)+1;
  });
  const dates=Object.keys(dateMap).sort().slice(-14);
  const labels=dates.map(formatDateShort);
  const datasets=visible.map(em=>{
    const u=usersCache[em];
    return{label:u?u.name.split(' ')[0]:em,data:dates.map(d=>(dateMap[d]||{})[em]||0),borderColor:pc(em),backgroundColor:pc(em)+'33',tension:.3,fill:false,pointRadius:4};
  });
  const ctx1=document.getElementById('chart-hist');
  if(ctx1&&labels.length) new Chart(ctx1,{type:'line',data:{labels,datasets},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}}},scales:{y:{min:0,ticks:{stepSize:1},grid:{color:'#f0f0ec'}},x:{grid:{display:false},ticks:{font:{size:10}}}}}});
  else if(ctx1) ctx1.parentElement.innerHTML+='<div style="font-size:13px;color:#bbb;padding:1rem 0;text-align:center">Sin historial aún</div>';

  const ctx2=document.getElementById('chart-comp');
  if(ctx2) new Chart(ctx2,{type:'bar',data:{
    labels:visible.map(em=>usersCache[em]?usersCache[em].name.split(' ')[0]:em),
    datasets:[
      {label:'Total',data:visible.map(em=>(byEmail[em]||[]).length),backgroundColor:'#e5e5e0'},
      {label:'Concluidas',data:visible.map(em=>(byEmail[em]||[]).filter(t=>t.status==='concluida').length),backgroundColor:visible.map(em=>pc(em))}
    ]},options:{responsive:true,plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}}},scales:{y:{min:0,ticks:{stepSize:1},grid:{color:'#f0f0ec'}},x:{grid:{display:false}}}}});
}

async function runAnalysis(){
  const visible=visibleEmails();
  const today=todayKey();
  const box=document.getElementById('abox');
  box.innerHTML='<span class="spinner"></span><span style="color:#bbb;font-style:italic"> Analizando...</span>';
  const allT=await sbGet('tareas',`?email=in.(${visible.map(e=>`"${e}"`).join(',')})&select=*`);
  const lines=visible.map(em=>{
    const u=usersCache[em];if(!u)return'';
    const tareas=(allT||[]).filter(t=>t.email===em&&(t.status==='pendiente'||(t.status==='concluida'&&t.fecha_conclusion?.startsWith(today))));
    if(!tareas.length)return`${u.name}: sin tareas`;
    const done=tareas.filter(t=>t.status==='concluida').length;
    return`${u.name} (${u.role==='admin'?'Director':u.role==='manager'?'Líder de Práctica Fiscal':'Consultor Junior'}) — ${done}/${tareas.length} concluidas:\n`+tareas.map(t=>`  ${t.status==='concluida'?'✓':'·'} ${t.descripcion}${t.client_name?' ['+t.client_name+']':''}`).join('\n');
  }).filter(Boolean).join('\n\n');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:`Eres asesor de productividad para MSST Consulting SC, firma de asesoría fiscal mexicana. Equipo: Manuel Santana (Director), Alberto (Líder de Práctica Fiscal), Yosded y Brenda (Consultores Junior).\n\nEstado de tareas hoy ${today}:\n\n${lines}\n\nAnálisis ejecutivo (máx 5 oraciones): (1) avance general del equipo, (2) quién va adelante y quién atrás, (3) recomendación de acción puntual. Tono Big 4, español, prosa corrida.`}]})});
    const data=await res.json();
    box.innerHTML=`<span style="font-size:14px;line-height:1.7">${data.content?.map(b=>b.text||'').join('')||'Sin respuesta.'}</span>`;
  }catch(e){box.innerHTML='<span style="color:#dc2626">Error al conectar.</span>';}
}

async function loadHistorial(){
  const sel=document.getElementById('hist-user-sel');
  const desde=document.getElementById('hist-desde').value;
  const hasta=document.getElementById('hist-hasta').value;
  const filterEmail=sel?sel.value:'all';
  const body=document.getElementById('hist-body');
  if(!body)return;
  body.innerHTML='<div class="loading"><span class="spinner"></span>Cargando...</div>';

  const visible=visibleEmails();
  // Seguridad: si el email filtrado no está en la lista visible del rol, ignorar
  const emailSafe=filterEmail==='all'||!visible.includes(filterEmail)?'all':filterEmail;
  const emails=emailSafe==='all'?visible:[emailSafe];

  // Cargar sesiones y tareas en paralelo
  const emailFilter='('+emails.map(e=>'"'+e+'"').join(',')+')';
  const [sesiones,tareas]=await Promise.all([
    sbGet('sesiones','?email=in.'+emailFilter+'&order=login_at.desc&select=*'),
    sbGet('tareas','?email=in.'+emailFilter+'&select=*&order=created_at.asc')
  ]);

  // Filtrar por rango de fechas
  const desdeDt=new Date(desde+'T00:00:00');
  const hastaDt=new Date(hasta+'T23:59:59');

  const sesionesFilt=(sesiones||[]).filter(s=>{
    const d=new Date(s.login_at);return d>=desdeDt&&d<=hastaDt;
  });

  // Agrupar sesiones por email
  const sesByEmail={};
  emails.forEach(e=>{sesByEmail[e]=[];});
  sesionesFilt.forEach(s=>{if(sesByEmail[s.email])sesByEmail[s.email].push(s);});

  // Agrupar tareas por email y fecha
  const tareasByEmail={};
  emails.forEach(e=>{tareasByEmail[e]=[];});
  (tareas||[]).forEach(t=>{
    const fechaAlta=t.created_at?t.created_at.slice(0,10):t.fecha_creacion;
    const fechaCon=t.fecha_conclusion?t.fecha_conclusion.slice(0,10):null;
    const enRango=(fechaAlta&&new Date(fechaAlta+'T12:00:00')>=desdeDt&&new Date(fechaAlta+'T12:00:00')<=hastaDt)||
                  (fechaCon&&new Date(fechaCon+'T12:00:00')>=desdeDt&&new Date(fechaCon+'T12:00:00')<=hastaDt);
    if(enRango&&tareasByEmail[t.email])tareasByEmail[t.email].push(t);
  });

  if(!emails.length){body.innerHTML='<div class="card"><div style="font-size:14px;color:#888">Sin datos.</div></div>';return;}

  let html='';
  emails.forEach(em=>{
    const u=usersCache[em];if(!u)return;
    const sesUser=sesByEmail[em]||[];
    const tareasUser=tareasByEmail[em]||[];

    // Estadísticas resumen
    const totalSes=sesUser.length;
    const totalMin=sesUser.reduce((s,x)=>s+(x.duracion_min||0),0);
    const totalHrs=Math.floor(totalMin/60);
    const restMin=totalMin%60;
    const tareasAlta=tareasUser.filter(t=>{
      const f=t.created_at?t.created_at.slice(0,10):t.fecha_creacion;
      return f&&new Date(f+'T12:00:00')>=desdeDt&&new Date(f+'T12:00:00')<=hastaDt;
    });
    const tareasCon=tareasUser.filter(t=>t.status==='concluida'&&t.fecha_conclusion&&new Date(t.fecha_conclusion.slice(0,10)+'T12:00:00')>=desdeDt);

    // Tabla de sesiones
    let sesRows='';
    if(sesUser.length){
      sesRows=sesUser.map(s=>{
        const entrada=new Date(s.login_at).toLocaleString('es-MX',{timeZone:'America/Tijuana',dateStyle:'short',timeStyle:'short'});
        const salida=s.logout_at?new Date(s.logout_at).toLocaleString('es-MX',{timeZone:'America/Tijuana',dateStyle:'short',timeStyle:'short'}):'<span style="color:#EF9F27;font-weight:500">Activa</span>';
        const dur=s.duracion_min!=null?(s.duracion_min>=60?Math.floor(s.duracion_min/60)+'h '+(s.duracion_min%60)+'min':s.duracion_min+' min'):'—';
        return '<tr>'+
          '<td>'+entrada+'</td>'+
          '<td>'+salida+'</td>'+
          '<td style="font-weight:600">'+dur+'</td>'+
        '</tr>';
      }).join('');
    } else {
      sesRows='<tr><td colspan="3" style="color:#bbb;text-align:center">Sin sesiones en este período</td></tr>';
    }

    // Tabla de tareas
    let tarRows='';
    if(tareasUser.length){
      // Ordenar: primero por fecha de alta, luego concluidas
      const sorted=[...tareasUser].sort((a,b)=>{
        const fa=a.created_at||a.fecha_creacion||'';
        const fb=b.created_at||b.fecha_creacion||'';
        return fa.localeCompare(fb);
      });
      tarRows=sorted.map(t=>{
        const fechaAlta=t.created_at?new Date(t.created_at).toLocaleString('es-MX',{timeZone:'America/Tijuana',dateStyle:'short',timeStyle:'short'}):t.fecha_creacion||'—';
        const fechaCon=t.fecha_conclusion?new Date(t.fecha_conclusion).toLocaleString('es-MX',{timeZone:'America/Tijuana',dateStyle:'short',timeStyle:'short'}):'—';
        const statusBadge=t.status==='concluida'?
          '<span style="background:#f0f7d4;color:#5a8a1a;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600">Concluida</span>':
          t.status==='standby'?
          '<span style="background:#E6F1FB;color:#3B4BC8;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600">Stand By</span>':
          t.status==='eliminada'?
          '<span style="background:#fef2f2;color:#dc2626;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600">Eliminada</span>':
          '<span style="background:#FEF3C7;color:#92400E;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600">Pendiente</span>';
        const asig=t.asignada_por&&t.asignada_por!==em&&usersCache[t.asignada_por]?
          '<div style="font-size:10px;color:#888;margin-top:2px">Asignada por '+escH(usersCache[t.asignada_por].name)+'</div>':'';
        const motivo=t.motivo_conclusion?'<div style="font-size:10px;color:#888;margin-top:2px">'+escH(t.motivo_conclusion)+'</div>':'';
        return '<tr>'+
          '<td><div style="font-size:13px;font-weight:500">'+escH(t.descripcion)+'</div>'+
            (t.client_name?'<div style="font-size:11px;color:#888">'+escH(t.client_name)+'</div>':'')+asig+'</td>'+
          '<td>'+statusBadge+motivo+'</td>'+
          '<td style="font-size:12px;color:#555">'+fechaAlta+'</td>'+
          '<td style="font-size:12px;color:#555">'+fechaCon+'</td>'+
        '</tr>';
      }).join('');
    } else {
      tarRows='<tr><td colspan="4" style="color:#bbb;text-align:center">Sin tareas en este período</td></tr>';
    }

    html+='<div class="card" style="margin-bottom:1.25rem">'+
      // Header usuario
      '<div style="display:flex;align-items:center;gap:12px;margin-bottom:1rem;padding-bottom:1rem;border-bottom:1px solid #e5e5e0">'+
        '<div class="avatar '+av(u.av)+'" style="width:40px;height:40px;font-size:14px">'+(u.initials||'??')+'</div>'+
        '<div style="flex:1">'+
          '<div style="font-size:15px;font-weight:700">'+escH(u.name)+'</div>'+
          '<div style="font-size:12px;color:#888">'+escH(u.email)+'</div>'+
        '</div>'+
        roleBadge(u.role)+
      '</div>'+
      // Métricas resumen
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem">'+
        '<div style="background:#f5f5f3;border-radius:8px;padding:10px;text-align:center">'+
          '<div style="font-size:11px;color:#888;margin-bottom:4px">Sesiones</div>'+
          '<div style="font-size:20px;font-weight:700;color:#3B4BC8">'+totalSes+'</div>'+
        '</div>'+
        '<div style="background:#f5f5f3;border-radius:8px;padding:10px;text-align:center">'+
          '<div style="font-size:11px;color:#888;margin-bottom:4px">Tiempo total</div>'+
          '<div style="font-size:20px;font-weight:700;color:#3B4BC8">'+(totalMin>0?totalHrs+'h '+restMin+'m':'—')+'</div>'+
        '</div>'+
        '<div style="background:#f5f5f3;border-radius:8px;padding:10px;text-align:center">'+
          '<div style="font-size:11px;color:#888;margin-bottom:4px">Tareas dadas de alta</div>'+
          '<div style="font-size:20px;font-weight:700;color:#EF9F27">'+tareasAlta.length+'</div>'+
        '</div>'+
        '<div style="background:#f5f5f3;border-radius:8px;padding:10px;text-align:center">'+
          '<div style="font-size:11px;color:#888;margin-bottom:4px">Tareas concluidas</div>'+
          '<div style="font-size:20px;font-weight:700;color:#8DC63F">'+tareasCon.length+'</div>'+
        '</div>'+
      '</div>'+
      // Tabla sesiones
      '<div style="font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Sesiones</div>'+
      '<div class="table-wrap" style="margin-bottom:1rem">'+
        '<table class="data-table">'+
          '<thead><tr><th>Entrada</th><th>Salida</th><th>Duración</th></tr></thead>'+
          '<tbody>'+sesRows+'</tbody>'+
        '</table>'+
      '</div>'+
      // Tabla tareas
      '<div style="font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">Tareas del período</div>'+
      '<div class="table-wrap">'+
        '<table class="data-table">'+
          '<thead><tr><th>Descripción</th><th>Estatus</th><th>Alta</th><th>Conclusión</th></tr></thead>'+
          '<tbody>'+tarRows+'</tbody>'+
        '</table>'+
      '</div>'+
    '</div>';
  });

  // ===== GRÁFICA GLOBAL: tareas por día =====
  // Recopilar todos los datos de tareas de todos los usuarios visibles
  const allTareasGraf=await sbGet('tareas','?email=in.'+emailFilter+'&select=created_at,fecha_creacion,fecha_conclusion,status&order=created_at.asc');
  const desdeDt2=new Date(document.getElementById('hist-desde').value+'T00:00:00');
  const hastaDt2=new Date(document.getElementById('hist-hasta').value+'T23:59:59');

  // Construir mapa de días en el rango
  const diasMap={};
  const cursor=new Date(desdeDt2);
  while(cursor<=hastaDt2){
    const k=cursor.toLocaleDateString('en-CA',{timeZone:'America/Tijuana'});
    diasMap[k]={alta:0,concluida:0};
    cursor.setDate(cursor.getDate()+1);
  }

  (allTareasGraf||[]).forEach(t=>{
    const fa=t.created_at?t.created_at.slice(0,10):t.fecha_creacion;
    const fc=t.fecha_conclusion?t.fecha_conclusion.slice(0,10):null;
    if(fa&&diasMap[fa])diasMap[fa].alta++;
    if(fc&&diasMap[fc]&&t.status==='concluida')diasMap[fc].concluida++;
  });

  const dias=Object.keys(diasMap).sort();
  const labelsGraf=dias.map(d=>new Date(d+'T12:00:00').toLocaleDateString('es-MX',{month:'short',day:'numeric'}));
  const dataAlta=dias.map(d=>diasMap[d].alta);
  const dataCon=dias.map(d=>diasMap[d].concluida);

  // Agregar canvas de gráfica al final del html
  html+='<div class="card" id="hist-graf-card" style="margin-bottom:1.25rem">'+
    '<div style="font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">Tareas registradas vs concluidas por día</div>'+
    '<canvas id="hist-chart" height="120"></canvas>'+
  '</div>';

  body.innerHTML=html||'<div class="card"><div style="font-size:14px;color:#888">Sin actividad en el período seleccionado.</div></div>';

  // Renderizar gráfica con Chart.js
  const ctx=document.getElementById('hist-chart');
  if(ctx&&dias.length){
    new Chart(ctx,{
      type:'bar',
      data:{
        labels:labelsGraf,
        datasets:[
          {label:'Dadas de alta',data:dataAlta,backgroundColor:'#EF9F2788',borderColor:'#EF9F27',borderWidth:1.5,borderRadius:4},
          {label:'Concluidas',data:dataCon,backgroundColor:'#8DC63F88',borderColor:'#8DC63F',borderWidth:1.5,borderRadius:4}
        ]
      },
      options:{
        responsive:true,
        plugins:{legend:{position:'bottom',labels:{boxWidth:12,font:{size:11}}}},
        scales:{
          y:{min:0,ticks:{stepSize:1},grid:{color:'#f0f0ec'}},
          x:{grid:{display:false},ticks:{font:{size:10},maxRotation:45}}
        }
      }
    });
  }
}

let activeGrupoFilter='all';
function renderGrupoTabs(){
  const tabs=document.getElementById('grupo-tabs');if(!tabs)return;

function filterByGrupo(id,el){activeGrupoFilter=id;document.querySelectorAll('#grupo-tabs .tab').forEach(t=>t.classList.remove('on'));el.classList.add('on');renderClientesTabla();}
function filterClientes(){renderClientesTabla();}
function renderClientesTabla(){
  const q=(document.getElementById('cli-search')||{value:''}).value.toLowerCase();
  const tbody=document.getElementById('cli-tbody');if(!tbody)return;
  let list=clientesCache;
  if(activeGrupoFilter==='none')list=list.filter(c=>!c.grupo_id);
  else if(activeGrupoFilter!=='all')list=list.filter(c=>c.grupo_id===activeGrupoFilter);
  if(q)list=list.filter(c=>(c.nombre+c.rfc+c.notas).toLowerCase().includes(q));
  if(!list.length){tbody.innerHTML=`<tr><td colspan="6" style="color:#bbb;text-align:center;padding:1rem">Sin resultados</td></tr>`;return;}
  const canEdit=session.role==='admin'||session.role==='manager';

    const grupoCell=c.grupos?'<span class="badge badge-group">'+escH(c.grupos.nombre)+'</span>':'—';
    const editBtn=canEdit?'<button class="btn btn-sm" onclick="editCliente(\''+c.id+'\')">​Editar</button>':'';

function editCliente(id){
  const c=clientesCache.find(x=>x.id===id);if(!c)return;
  document.getElementById('cf-nombre').value=c.nombre||'';document.getElementById('cf-rfc').value=c.rfc||'';
  document.getElementById('cf-tipo').value=c.tipo||'';document.getElementById('cf-grupo').value=c.grupo_id||'';
  document.getElementById('cf-resp').value=c.responsable||'';document.getElementById('cf-notas').value=c.notas||'';
  document.getElementById('cf-editing').value=id;
  document.getElementById('cli-form-label').textContent='Editar cliente';
  document.getElementById('cf-btn').textContent='Actualizar cliente';
  document.getElementById('cli-form-card').scrollIntoView({behavior:'smooth'});
}
async function saveCliente(){
  const nombre=document.getElementById('cf-nombre').value.trim();
  const rfc=document.getElementById('cf-rfc').value.trim().toUpperCase();
  const tipo=document.getElementById('cf-tipo').value;
  const grupo_id=document.getElementById('cf-grupo').value||null;
  const responsable=document.getElementById('cf-resp').value;
  const notas=document.getElementById('cf-notas').value.trim();
  const editing=document.getElementById('cf-editing').value;
  const err=document.getElementById('cf-err');err.style.display='none';
  if(!nombre){err.textContent='El nombre es obligatorio.';err.style.display='block';return;}
  const dup=clientesCache.find(c=>c.nombre.toLowerCase()===nombre.toLowerCase()&&c.id!==editing);
  if(dup){err.textContent='Ya existe un cliente con ese nombre.';err.style.display='block';return;}
  const btn=document.getElementById('cf-btn');btn.innerHTML='<span class="spinner"></span> Guardando...';btn.disabled=true;
  if(editing)await sbPatch('clientes',`?id=eq.${editing}`,{nombre,rfc,tipo,grupo_id,responsable,notas});
  else await sbPost('clientes',{nombre,rfc,tipo,grupo_id,responsable,notas});
  await loadCaches();
  btn.innerHTML=editing?'Actualizar cliente':'Guardar cliente';btn.disabled=false;
  document.getElementById('cf-editing').value='';
  ['cf-nombre','cf-rfc','cf-notas'].forEach(i=>{document.getElementById(i).value='';});
  ['cf-tipo','cf-grupo','cf-resp'].forEach(i=>{document.getElementById(i).value='';});
  const ok=document.getElementById('cf-ok');ok.style.display='block';
  setTimeout(()=>ok.style.display='none',2000);
  renderClientesTabla();renderGrupoTabs();
}
async function deleteCliente(id){
  const c=clientesCache.find(x=>x.id===id);
  if(!confirm(`¿Eliminar "${c?.nombre}"?`))return;
  await sbDelete('clientes',`?id=eq.${id}`);
  await loadCaches();renderClientesTabla();
}

  if(count>0){alert(`No puedes eliminar "${nombre}" — tiene ${count} cliente(s).`);return;}
  if(!confirm(`¿Eliminar grupo "${nombre}"?`))return;
  await sbDelete('grupos',`?id=eq.${id}`);
  await loadCaches();renderGruposList();
}

async function deleteUser(email){
  if(email===session.email)return;

async function saveUser(){
  const name=document.getElementById('un').value.trim();
  const email=document.getElementById('ue').value.trim().toLowerCase();
  const pass=document.getElementById('up').value.trim();
  const role=document.getElementById('ur').value;
  const editing=document.getElementById('uediting').value;
  const err=document.getElementById('aerr');err.style.display='none';
  if(!name||!email||!pass){err.textContent='Completa todos los campos.';err.style.display='block';return;}
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){err.textContent='Correo inválido.';err.style.display='block';return;}
  const AVM={admin:'av-m',manager:'av-a',assistant:'av-y'};

  const av2=AVM[role]||'av-y';
  const btn=document.getElementById('subtn');btn.innerHTML='<span class="spinner"></span> Guardando...';btn.disabled=true;

  await sbUpsert('users',{email,name,role,initials,av:av2,pass},'email');

  setTimeout(()=>{ok.style.display='none';renderAdmin();},1500);

  negada:{label:'Negada / Rechazada',color:'#dc2626',bg:'#fef2f2'}
};

  'e.firma vigente del contribuyente',
  'Declaración mensual IVA del período presentada',
  'DIOT del período presentada',
  'Estado de cuenta bancario (máx. 2 meses) con CLABE',

];

let devCache=[];

function diasHabilesDesde(fechaStr,dias){
  const festivos=['01-01','02-05','03-21','05-01','09-16','11-20','12-25'];
  let d=new Date(fechaStr+'T12:00:00');
  let count=0;
  while(count<dias){
    d.setDate(d.getDate()+1);
    const dow=d.getDay();
    const mm=(d.getMonth()+1).toString().padStart(2,'0');
    const dd=d.getDate().toString().padStart(2,'0');
    const key=mm+'-'+dd;
    if(dow!==0&&dow!==6&&!festivos.includes(key))count++;
  }
  return d.toLocaleDateString('en-CA',{timeZone:'America/Tijuana'});
}

function calcPlazos(dev){
  if(!dev.fecha_inicio)return{};
  const fi=dev.fecha_inicio;
  const fp=dev.fecha_presentacion_sat||diasHabilesDesde(fi,10);
  return{
    presentacion:fp,
    limite_req1:diasHabilesDesde(fp,20),
    limite_resolucion:diasHabilesDesde(fp,40),
  };
}

function devStatusBadge(status){
  const s=DEV_STATUS[status]||{label:status,color:'#888',bg:'#f5f5f3'};
  return '<span style="background:'+s.bg+';color:'+s.color+';padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600">'+s.label+'</span>';
}

function fmtMXN(n){
  if(!n&&n!==0)return'—';
  return'$'+Number(n).toLocaleString('es-MX',{minimumFractionDigits:2,maximumFractionDigits:2});
}

function diasRestantes(fechaStr){
  if(!fechaStr)return null;
  const hoy=new Date(todayKey()+'T12:00:00');
  const target=new Date(fechaStr+'T12:00:00');
  return Math.round((target-hoy)/(1000*60*60*24));
}

function alertaDias(d,label){
  if(d===null)return'';
  if(d<0)return'<span style="background:#fef2f2;color:#dc2626;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600">'+label+': vencido hace '+Math.abs(d)+' días</span>';
  if(d<=5)return'<span style="background:#FEF3C7;color:#92400E;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600">'+label+': '+d+' días</span>';
  return'<span style="background:#f0f7d4;color:#5a8a1a;padding:2px 8px;border-radius:999px;font-size:10px;font-weight:600">'+label+': '+d+' días</span>';
}

  if(cerrados.length){
    html+='<div class="sec-label" style="margin-top:1rem;margin-bottom:8px">Concluidas / Negadas ('+cerrados.length+')</div>';

      html+='<div class="card" style="margin-bottom:8px;opacity:.8;cursor:pointer" onclick="renderDetalleDevolucion(\''+d.id+'\')">'+

  }

  el.innerHTML=html;
}

async function saveDevolucion(){
  const cliSel=document.getElementById('df-cliente');
  const cliente_id=cliSel.value||null;
  const cliente_nombre=document.getElementById('df-cli-nombre').value||cliSel.options[cliSel.selectedIndex]?.dataset?.nombre||'';
  const mes=document.getElementById('df-mes').value;
  const anio=document.getElementById('df-anio').value;
  const periodo=(mes&&anio)?mes+' '+anio:'';
  const fecha_inicio=document.getElementById('df-inicio').value;
  const responsable=document.getElementById('df-resp').value;
  const monto_solicitado=parseFloat(document.getElementById('df-monto-sol').value)||null;
  const monto_devuelto=parseFloat(document.getElementById('df-monto-dev').value)||null;
  const status=document.getElementById('df-status').value;
  const folio_fed=document.getElementById('df-folio').value.trim()||null;
  const fecha_presentacion_sat=document.getElementById('df-fecpres').value||null;
  const fecha_deposito=document.getElementById('df-fecdep').value||null;
  const correos_raw=document.getElementById('df-correos').value;
  const correos_cliente=correos_raw.split(',').map(s=>s.trim()).filter(Boolean);
  const motivo_rechazo=document.getElementById('df-rechazo').value.trim()||null;
  const notas=document.getElementById('df-notas').value.trim()||null;
  const editing=document.getElementById('df-editing').value;
  const err=document.getElementById('df-err');err.style.display='none';
  if(!periodo||!fecha_inicio){err.textContent='Período y fecha de inicio son obligatorios.';err.style.display='block';return;}

  const payload={cliente_id,cliente_nombre,periodo,fecha_inicio,responsable,monto_solicitado,monto_devuelto,status,folio_fed,fecha_presentacion_sat,fecha_deposito,correos_cliente,motivo_rechazo,notas,updated_at:nowISO()};

  if(editing){
    await sbPatch('devoluciones_iva','?id=eq.'+editing,payload);
    // Si es nueva, cargar checklist de requisitos SAT
  } else {
    const res=await sbPost('devoluciones_iva',payload,'return=representation');
    const data=await res.json();
    const newId=(Array.isArray(data)?data[0]:data)?.id;
    if(newId){
      // Cargar checklist SAT por defecto
      const reqs=DEV_REQUISITOS_SAT.map(r=>({devolucion_id:newId,requisito:r,completado:false}));
      for(const r of reqs) await sbPost('dev_requisitos',r,'return=minimal');
    }
  }
  await loadDevoluciones();
  renderDevoluciones();
}

async function toggleRequisito(reqId,actual,devId){
  const nuevo=!actual;
  const patch={completado:nuevo};
  if(nuevo)patch.fecha_completado=todayKey();
  else patch.fecha_completado=null;
  await sbPatch('dev_requisitos','?id=eq.'+reqId,patch);
  renderDetalleDevolucion(devId);
}

async function togglePuntoReq(pId,actual,devId){
  const nuevo=!actual;
  const patch={atendido:nuevo};
  if(nuevo)patch.fecha_atendido=todayKey();
  else patch.fecha_atendido=null;
  await sbPatch('dev_requerimientos','?id=eq.'+pId,patch);
  renderDetalleDevolucion(devId);
}

async function activarRequerimiento(devId){
  await sbPatch('devoluciones_iva','?id=eq.'+devId,{status:'requerimiento_sat',updated_at:nowISO()});
  const idx=devCache.findIndex(d=>d.id===devId);
  if(idx>=0)devCache[idx].status='requerimiento_sat';
  renderDetalleDevolucion(devId);
}

async function agregarPuntoRequerimiento(devId,numReq){
  const punto=prompt('Describe el punto requerido por el SAT:');
  if(!punto||!punto.trim())return;
  // Verificar que no se repita
  const existing=await sbGet('dev_requerimientos','?devolucion_id=eq.'+devId+'&select=punto');
  const puntos=(existing||[]).map(p=>p.punto.toLowerCase().trim());
  if(puntos.includes(punto.trim().toLowerCase())){
    alert('Este punto ya fue registrado anteriormente.');return;
  }
  await sbPost('dev_requerimientos',{devolucion_id:devId,numero_requerimiento:numReq,punto:punto.trim(),atendido:false,fecha_requerimiento:todayKey()},'return=minimal');
  renderDetalleDevolucion(devId);
}


renderLogin();
</script>
